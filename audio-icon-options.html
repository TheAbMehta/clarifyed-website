<!DOCTYPE html>
<html><head><style>
body { background: #f5f0e8; display: flex; justify-content: center; align-items: center; gap: 60px; height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
.card { text-align: center; }
.card > div:first-child { background: white; border-radius: 24px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 12px; }
.label { font-weight: 600; font-size: 14px; color: #1a1a1a; }
</style></head><body>
<div class="card"><div>

</svg>
</div><div class="label">A: Microphone</div></div>

  <path d="M32 48 V56" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
</svg>
</div><div class="label">B: Headphones</div></div>

<div class="card"><div>

  <path d="M38 8 Q56 32 38 56" fill="none" stroke="#8ebf9e" stroke-width="3" stroke-linecap="round"/>
</svg>

</body></html>
